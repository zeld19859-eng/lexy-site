<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lexy Baba Shake Dükkanı</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Arial Black', sans-serif; background: #0a0a0a; color: #fff; text-align: center; margin: 0; }
        header { padding: 50px; border-bottom: 3px solid #9d00ff; box-shadow: 0 0 20px #9d00ff; background: rgba(157, 0, 255, 0.05); }
        .logo { font-size: 3rem; text-shadow: 0 0 15px #9d00ff; letter-spacing: 2px; }
        .container { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; padding: 40px; }
        
        .card { 
            background: #1a1a1a; 
            border: 2px solid #9d00ff; 
            padding: 25px; 
            border-radius: 15px; 
            width: 320px; 
            transition: 0.4s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }
        
        .card:hover { transform: translateY(-10px); border-color: #fff; box-shadow: 0 0 30px #9d00ff; }
        
        h3 { color: #9d00ff; margin-bottom: 10px; font-size: 1.5rem; }
        p { font-size: 0.9rem; color: #ccc; margin-bottom: 15px; }

        .download-btn { 
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: #9d00ff; 
            color: white; 
            padding: 12px; 
            text-decoration: none; 
            border-radius: 8px; 
            font-weight: bold;
            transition: 0.3s;
        }
        
        .download-btn:hover { background: white; color: #9d00ff; }
        footer { margin-top: 50px; padding: 20px; color: #666; font-size: 0.8rem; }
    </style>
</head>
<body>

    <header>
        <div class="logo">LEXY BABA SHAKE DÜKKANI</div>
        <p>Alight Motion Dehşet Presetler & Kaliteli CC</p>
    </header>

    <div class="container">
        
        <div class="card">
            <i class="fas fa-bolt" style="font-size: 2.5rem; color: #9d00ff; margin-bottom: 15px;"></i>
            <h3>MEGA SHAKE V1</h3>
            <p>Dehşet Shake dosyası. Editlerini uçurur!</p>
            <a href="https://www.mediafire.com/file/gze5ojkyofqgbt0/Dehset_Shake.xml/file" target="_blank" class="download-btn">
                <i class="fas fa-download"></i> İNDİR (XML)
            </a>
        </div>

        <div class="card">
            <i class="fas fa-fill-drip" style="font-size: 2.5rem; color: #00d4ff; margin-bottom: 15px;"></i>
            <h3>DEWRO BUBA CC</h3>
            <p>En kaliteli renk ayarı (CC). Videon parlasın!</p>
            <a href="https://www.mediafire.com/file/qv7oa2xdynh1ig5/DEWRO_BUBA_KAL%25C4%25B0TEL%25C4%25B0_CC_%25F0%259F%2587%25A6%25F0%259F%2587%25B1.xml/file" target="_blank" class="download-btn" style="background: #00d4ff; color: #000;">
                <i class="fas fa-download"></i> İNDİR (XML)
            </a>
        </div>

    </div>

    <footer>
        <p>© 2026 Lexy Baba Design | Alight Motion Edit Dünyası</p>
    </footer>

</body>
</html>
